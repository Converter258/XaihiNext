<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'" />
  <title>XN Agent</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    #result { margin-top: 1rem; padding: 1rem; border-radius: 8px; white-space: pre-wrap; }
    .ok { background: #d4edda; border: 1px solid #c3e6cb; }
    .err { background: #f8d7da; border: 1px solid #f5c6cb; }
    .pending { background: #fff3cd; border: 1px solid #ffeaa7; }
  </style>
</head>
<body>
  <h1>XN Agent Test</h1>
  <div id="result" class="pending">⏳ Sending test message to backend...</div>

  <script>
    (async () => {
      const el = document.getElementById('result');
      try {
        const res = await window.api.sendMessage('test');
        el.className = 'ok';
        el.textContent = '[OK] Backend responded:\n' + JSON.stringify(res, null, 2);
      } catch (err) {
        el.className = 'err';
        el.textContent = '[FAIL] ' + (err.message || err);
      }
    })();
  </script>
</body>
</html>
